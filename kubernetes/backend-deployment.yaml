apiVersion: apps/v1
kind: Deployment
metadata:
  name: harvest-backend
  namespace: harvest-mood
spec:
  replicas: 2
  selector:
    matchLabels:
      app: harvest-backend
  template:
    metadata:
      labels:
        app: harvest-backend
    spec:
      containers:
      - name: backend
        image: bobanius/harvest-backend:latest
        ports:
        - containerPort: 4000
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: harvest-backend-config
              key: PORT
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: harvest-backend-config
              key: DB_USER
        - name: DB_SERVER
          valueFrom:
            configMapKeyRef:
              name: harvest-backend-config
              key: DB_SERVER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: harvest-backend-config
              key: DB_NAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: harvest-backend-secrets
              key: db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: harvest-backend-secrets
              key: jwt-secret